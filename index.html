<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Telepon Video · Fullscreen</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        .container {
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            background: #0a0e17;
            position: relative;
            overflow: hidden;
        }

        /* === REMOTE VIDEO - FULLSCREEN === */
        #remoteVideoBox {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0e17;
            z-index: 1;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #remoteVideoBox video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #0a0e17;
            display: none;
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        #remoteVideoBox .video-placeholder {
            color: #7b8ba3;
            font-size: 1.1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 20px;
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #remoteVideoBox .video-placeholder i {
            font-size: 4rem;
            color: #3e4b62;
        }

        /* Remote video zoom states */
        #remoteVideoBox.zoomed-out video {
            transform: scale(0.6);
        }

        #remoteVideoBox.zoomed-in video {
            transform: scale(1.8);
        }

        #remoteVideoBox.zoomed-normal video {
            transform: scale(1);
        }

        /* Tap indicator */
        .tap-hint {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.7rem;
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: none;
            z-index: 10;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 0.9;
            }
        }

        /* === LOCAL VIDEO - PICTURE-IN-PICTURE === */
        #localVideoBox {
            position: absolute;
            bottom: 100px;
            right: 16px;
            width: 120px;
            height: 160px;
            border-radius: 16px;
            overflow: hidden;
            z-index: 10;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.8);
            background: #1a1a2e;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        #localVideoBox:active {
            transform: scale(0.95);
        }

        #localVideoBox video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            display: none;
        }

        #localVideoBox .video-placeholder {
            color: #7b8ba3;
            font-size: 0.7rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            height: 100%;
            text-align: center;
        }

        #localVideoBox .video-placeholder i {
            font-size: 2rem;
            color: #3e4b62;
        }

        #localVideoBox .label {
            position: absolute;
            bottom: 6px;
            left: 8px;
            background: rgba(0, 0, 0, 0.7);
            padding: 2px 10px;
            border-radius: 12px;
            color: #d3def0;
            font-size: 0.6rem;
            font-weight: 500;
            border: 1px solid #3d4a60;
        }

        /* Local video - draggable */
        #localVideoBox.dragging {
            opacity: 0.8;
            transform: scale(1.05);
            border-color: #2d7aff;
        }

        /* === CONTROLS === */
        .controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            z-index: 20;
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 0 16px;
            flex-wrap: wrap;
        }

        .btn {
            background: rgba(32, 42, 58, 0.9);
            backdrop-filter: blur(8px);
            border: none;
            border-radius: 50px;
            padding: 12px 18px;
            min-width: 56px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #c8d6ec;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: all 0.15s ease;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.08);
            flex: 0 1 auto;
        }

        .btn:active {
            transform: scale(0.92);
        }

        .btn i {
            font-size: 1.1rem;
        }

        .btn-danger {
            background: rgba(227, 74, 90, 0.9);
            border-color: rgba(255, 94, 111, 0.3);
            color: white;
        }

        .btn-danger:active {
            background: rgba(227, 74, 90, 1);
        }

        .btn-success {
            background: rgba(29, 185, 84, 0.9);
            border-color: rgba(58, 208, 110, 0.3);
            color: white;
        }

        .btn-primary {
            background: rgba(45, 122, 255, 0.9);
            border-color: rgba(75, 138, 255, 0.3);
            color: white;
        }

        .btn-warning {
            background: rgba(243, 156, 18, 0.9);
            border-color: rgba(241, 196, 15, 0.3);
            color: white;
        }

        .btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .btn-icon-only {
            min-width: 48px;
            padding: 12px;
            border-radius: 50%;
        }

        /* === STATUS BAR === */
        .status-bar {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            z-index: 15;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            pointer-events: none;
        }

        .status-badge {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            padding: 6px 14px;
            border-radius: 30px;
            color: #8ea4cb;
            font-size: 0.7rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: auto;
        }

        .status-badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .dot.green { background: #2ecc71; }
        .dot.red { background: #e74c5e; }
        .dot.yellow { background: #f1c40f; }
        .dot.blue { background: #3498db; }
        .dot.purple { background: #9b59b6; }
        .dot.orange { background: #e67e22; }

        .status-text {
            color: #d3def0;
            font-weight: 500;
        }

        /* === ZOOM TOAST === */
        .zoom-toast {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.8);
            font-size: 2rem;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px 30px;
            border-radius: 16px;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .zoom-toast.show {
            opacity: 1;
        }

        /* === RESPONSIVE === */
        @media (max-width: 480px) {
            #localVideoBox {
                width: 80px;
                height: 110px;
                bottom: 80px;
                right: 10px;
                border-radius: 12px;
            }

            .btn {
                padding: 10px 14px;
                font-size: 0.75rem;
                min-width: 44px;
            }

            .btn i {
                font-size: 0.9rem;
            }

            .btn-icon-only {
                min-width: 40px;
                padding: 10px;
            }

            .controls {
                gap: 8px;
                bottom: 14px;
            }

            .status-badge {
                font-size: 0.6rem;
                padding: 4px 10px;
            }

            .tap-hint {
                font-size: 0.6rem;
                bottom: 70px;
                padding: 4px 12px;
            }

            #remoteVideoBox.zoomed-out video {
                transform: scale(0.5);
            }

            #remoteVideoBox.zoomed-in video {
                transform: scale(2.2);
            }

            .zoom-toast {
                font-size: 1.5rem;
                padding: 14px 22px;
            }
        }

        @media (max-width: 380px) {
            #localVideoBox {
                width: 64px;
                height: 88px;
                bottom: 70px;
                right: 8px;
            }

            .btn {
                padding: 8px 10px;
                font-size: 0.65rem;
                min-width: 36px;
            }

            .btn i {
                font-size: 0.75rem;
            }
        }

        @media (min-width: 768px) {
            #localVideoBox {
                width: 180px;
                height: 240px;
                bottom: 120px;
                right: 24px;
            }

            .btn {
                padding: 16px 28px;
                font-size: 1rem;
                min-width: 80px;
            }

            .btn i {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="app">

        <!-- === REMOTE VIDEO (Fullscreen) === -->
        <div id="remoteVideoBox" class="zoomed-normal">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="video-placeholder" id="remotePlaceholder">
                <i class="fas fa-user-circle"></i>
                <span>Menunggu peserta lain...</span>
                <div style="width:24px;height:24px;border:2px solid #2e3a52;border-top:2px solid #7aa2f0;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
            </div>
            <div class="tap-hint" id="tapHint">👆 Tap untuk zoom</div>
        </div>

        <!-- === ZOOM TOAST === -->
        <div class="zoom-toast" id="zoomToast">🔍</div>

        <!-- === LOCAL VIDEO (PIP) === -->
        <div id="localVideoBox" draggable="false">
            <video id="localVideo" autoplay muted playsinline></video>
            <div class="video-placeholder" id="localPlaceholder">
                <i class="fas fa-user-circle"></i>
                <span>Kamera</span>
            </div>
            <span class="label"><i class="fas fa-user"></i> Kamu</span>
        </div>

        <!-- === STATUS BAR === -->
        <div class="status-bar">
            <div class="status-badge">
                <span class="dot" id="statusDot"></span>
                <span class="status-text" id="statusText">Menghubungkan...</span>
            </div>
            <div class="status-badge">
                <i class="fas fa-users" style="color:#5d7bb3;"></i>
                <span id="peerCount">1</span>
            </div>
        </div>

        <!-- === CONTROLS === -->
        <div class="controls">
            <button class="btn btn-danger" id="endCallBtn" disabled>
                <i class="fas fa-phone-slash"></i>
            </button>
            <button class="btn" id="toggleMicBtn">
                <i class="fas fa-microphone"></i>
            </button>
            <button class="btn" id="toggleCamBtn">
                <i class="fas fa-video"></i>
            </button>
            <button class="btn btn-warning" id="reconnectBtn">
                <i class="fas fa-sync-alt"></i>
            </button>
            <button class="btn btn-primary" id="fullscreenBtn">
                <i class="fas fa-expand"></i>
            </button>
        </div>

        <style>
            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }
        </style>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js">
    </script>
    <script>
        (function() {
            'use strict';

            // --- DOM ---
            const remoteVideoBox = document.getElementById('remoteVideoBox');
            const remoteVideo = document.getElementById('remoteVideo');
            const localVideo = document.getElementById('localVideo');
            const localVideoBox = document.getElementById('localVideoBox');
            const remotePlaceholder = document.getElementById('remotePlaceholder');
            const localPlaceholder = document.getElementById('localPlaceholder');
            const statusText = document.getElementById('statusText');
            const statusDot = document.getElementById('statusDot');
            const peerCount = document.getElementById('peerCount');
            const endCallBtn = document.getElementById('endCallBtn');
            const toggleMicBtn = document.getElementById('toggleMicBtn');
            const toggleCamBtn = document.getElementById('toggleCamBtn');
            const reconnectBtn = document.getElementById('reconnectBtn');
            const fullscreenBtn = document.getElementById('fullscreenBtn');
            const tapHint = document.getElementById('tapHint');
            const zoomToast = document.getElementById('zoomToast');

            // --- Constants ---
            const ROOM_ID = 'VIDEOAUTO';
            const PEERJS_OPTIONS = {
                debug: 2,
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                        { urls: 'stun:stun2.l.google.com:19302' },
                        { urls: 'stun:stun3.l.google.com:19302' },
                        { urls: 'stun:stun4.l.google.com:19302' }
                    ]
                }
            };

            // --- State ---
            let peer = null;
            let localStream = null;
            let remoteStream = null;
            let currentCall = null;
            let isCallActive = false;
            let isMicMuted = false;
            let isCamOff = false;
            let isConnecting = false;
            let findInterval = null;
            let reconnectAttempts = 0;
            const MAX_RECONNECT = 20;

            // --- Zoom State ---
            let zoomLevel = 0; // 0=normal, 1=out, 2=in
            const ZOOM_CLASSES = ['zoomed-normal', 'zoomed-out', 'zoomed-in'];
            let toastTimeout = null;

            // --- Toast ---
            function showZoomToast(icon) {
                zoomToast.textContent = icon;
                zoomToast.classList.add('show');
                clearTimeout(toastTimeout);
                toastTimeout = setTimeout(() => {
                    zoomToast.classList.remove('show');
                }, 600);
            }

            // --- Status ---
            function setStatus(text, dotColor) {
                statusText.textContent = text;
                statusDot.className = 'dot ' + dotColor;
            }

            // --- UI Update ---
            function updateUI() {
                endCallBtn.disabled = !isCallActive;

                if (localStream) {
                    localPlaceholder.style.display = 'none';
                    localVideo.style.display = 'block';
                } else {
                    localPlaceholder.style.display = 'flex';
                    localVideo.style.display = 'none';
                }

                if (remoteStream) {
                    remotePlaceholder.style.display = 'none';
                    remoteVideo.style.display = 'block';
                    tapHint.style.display = 'block';
                } else {
                    remotePlaceholder.style.display = 'flex';
                    remoteVideo.style.display = 'none';
                    tapHint.style.display = 'none';
                }

                toggleMicBtn.innerHTML = isMicMuted ?
                    '<i class="fas fa-microphone-slash"></i>' :
                    '<i class="fas fa-microphone"></i>';
                toggleCamBtn.innerHTML = isCamOff ?
                    '<i class="fas fa-video-slash"></i>' :
                    '<i class="fas fa-video"></i>';

                const count = isCallActive ? 2 : 1;
                peerCount.textContent = count;
            }

            // --- Get Local Media ---
            async function getLocalMedia() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: 'user',
                            width: { ideal: 360 },
                            height: { ideal: 480 }
                        },
                        audio: {
                            echoCancellation: true,
                            noiseSuppression: true,
                            autoGainControl: true
                        }
                    });
                    return stream;
                } catch (err) {
                    console.error('Gagal akses kamera/mikrofon:', err);
                    alert('Izin kamera/mikrofon diperlukan!');
                    return null;
                }
            }

            // --- Start Local Stream ---
            async function startLocalStream() {
                if (localStream) {
                    const hasActive = localStream.getTracks().some(t => t.enabled);
                    if (hasActive) return true;
                }

                localStream = await getLocalMedia();
                if (!localStream) return false;

                localVideo.srcObject = localStream;
                try { await localVideo.play(); } catch (e) { console.warn('local play error:', e); }
                updateUI();
                return true;
            }

            // --- Generate ID ---
            function generateId() {
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
                let result = '';
                for (let i = 0; i < 4; i++) {
                    result += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                return ROOM_ID + '-' + result;
            }

            // --- Try Call Peer ---
            function tryCallPeer(targetId) {
                if (!peer || isCallActive || !localStream) return false;
                if (targetId === peer.id) return false;

                try {
                    console.log('📞 Calling:', targetId);
                    const call = peer.call(targetId, localStream);
                    if (call) {
                        setupCall(call, targetId);
                        return true;
                    }
                } catch (e) {
                    // Peer not found
                }
                return false;
            }

            // --- Find and Connect ---
            function findAndConnect() {
                if (!peer || isCallActive || isConnecting) return;

                setStatus('Mencari peserta...', 'orange');

                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
                const candidates = [];

                for (let i = 0; i < 20; i++) {
                    let id = ROOM_ID + '-';
                    for (let j = 0; j < 4; j++) {
                        id += chars.charAt(Math.floor(Math.random() * chars.length));
                    }
                    if (id !== peer.id) candidates.push(id);
                }

                candidates.push(ROOM_ID + '-AAAA');
                candidates.push(ROOM_ID + '-BBBB');
                candidates.push(ROOM_ID + '-CCCC');
                candidates.push(ROOM_ID + '-DDDD');

                let found = false;
                for (const targetId of candidates) {
                    if (tryCallPeer(targetId)) {
                        found = true;
                        break;
                    }
                }

                if (!found && !isCallActive) {
                    setStatus('Menunggu peserta...', 'orange');
                }
            }

            // --- Setup Call ---
            function setupCall(call, targetId) {
                if (isCallActive) {
                    call.close();
                    return;
                }

                currentCall = call;
                isCallActive = true;
                setStatus('Menghubungi...', 'yellow');
                updateUI();

                if (findInterval) {
                    clearInterval(findInterval);
                    findInterval = null;
                }

                call.on('stream', (stream) => {
                    remoteStream = stream;
                    remoteVideo.srcObject = stream;
                    remoteVideo.play().catch(e => console.warn('remote play error:', e));
                    setStatus('Terhubung! 🎉', 'green');
                    updateUI();
                    // Reset zoom to normal when connected
                    setZoom(0);
                });

                call.on('close', () => {
                    console.log('Call closed');
                    endCall();
                });

                call.on('error', (err) => {
                    console.error('Call error:', err);
                    endCall();
                });
            }

            // --- Handle Incoming Call ---
            async function handleIncomingCall(call) {
                if (isCallActive) {
                    call.close();
                    return;
                }

                const success = await startLocalStream();
                if (!success) {
                    call.close();
                    return;
                }

                call.answer(localStream);
                currentCall = call;
                isCallActive = true;
                setStatus('Menerima...', 'yellow');
                updateUI();

                if (findInterval) {
                    clearInterval(findInterval);
                    findInterval = null;
                }

                call.on('stream', (stream) => {
                    remoteStream = stream;
                    remoteVideo.srcObject = stream;
                    remoteVideo.play().catch(e => console.warn('remote play error:', e));
                    setStatus('Terhubung! 🎉', 'green');
                    updateUI();
                    setZoom(0);
                });

                call.on('close', () => {
                    console.log('Call closed');
                    endCall();
                });

                call.on('error', (err) => {
                    console.error('Call error:', err);
                    endCall();
                });
            }

            // --- End Call ---
            function endCall() {
                if (currentCall) {
                    try { currentCall.close(); } catch (e) {}
                    currentCall = null;
                }

                if (remoteStream) {
                    remoteStream.getTracks().forEach(t => t.stop());
                    remoteStream = null;
                    remoteVideo.srcObject = null;
                }

                isCallActive = false;
                setStatus('Mencari peserta...', 'orange');
                updateUI();
                remotePlaceholder.style.display = 'flex';
                remoteVideo.style.display = 'none';
                setZoom(0);

                if (peer) {
                    setTimeout(() => startFinding(), 2000);
                }
            }

            // --- Start Finding ---
            function startFinding() {
                if (findInterval) {
                    clearInterval(findInterval);
                    findInterval = null;
                }

                findAndConnect();

                findInterval = setInterval(() => {
                    if (!isCallActive && peer) {
                        findAndConnect();
                    }
                }, 4000);
            }

            // --- Initialize Peer ---
            function initPeer() {
                if (isConnecting) return;
                isConnecting = true;

                if (peer) {
                    try { peer.destroy(); } catch (e) {}
                    peer = null;
                }

                setStatus('Menghubungkan...', 'purple');

                const peerId = generateId();
                console.log('🔑 Peer ID:', peerId);

                peer = new Peer(peerId, PEERJS_OPTIONS);

                peer.on('open', (id) => {
                    console.log('✅ Peer connected:', id);
                    setStatus('Siap terhubung', 'blue');
                    isConnecting = false;
                    reconnectAttempts = 0;

                    startLocalStream().then(() => {
                        setTimeout(startFinding, 1000);
                    });
                });

                peer.on('call', (call) => {
                    handleIncomingCall(call);
                });

                peer.on('error', (err) => {
                    console.error('❌ Peer error:', err);

                    if (err.type === 'unavailable-id') {
                        const newId = generateId();
                        console.log('🔄 Retry with:', newId);
                        peer.id = newId;
                        peer.reconnect();
                    } else if (err.type === 'network' || err.type === 'server-error') {
                        setStatus('Jaringan bermasalah...', 'yellow');
                        isConnecting = false;
                        reconnectAttempts++;
                        if (reconnectAttempts < MAX_RECONNECT) {
                            setTimeout(() => initPeer(), 3000 * Math.min(reconnectAttempts, 5));
                        } else {
                            setStatus('Gagal terhubung', 'red');
                        }
                    } else {
                        setStatus('Error: ' + err.message, 'red');
                        isConnecting = false;
                    }
                });

                peer.on('disconnected', () => {
                    console.log('⚠️ Peer disconnected');
                    setStatus('Terputus, menghubungkan...', 'yellow');
                    peer.reconnect();
                });

                peer.on('close', () => {
                    console.log('🔴 Peer closed');
                    setStatus('Terputus', 'red');
                    endCall();
                    setTimeout(() => initPeer(), 3000);
                });
            }

            // --- Reconnect ---
            function reconnect() {
                endCall();
                if (findInterval) {
                    clearInterval(findInterval);
                    findInterval = null;
                }
                if (peer) {
                    try { peer.destroy(); } catch (e) {}
                    peer = null;
                }
                isConnecting = false;
                setTimeout(() => initPeer(), 500);
            }

            // --- Toggle Mic ---
            function toggleMic() {
                if (!localStream) return;
                const tracks = localStream.getAudioTracks();
                if (tracks.length === 0) return;
                isMicMuted = !isMicMuted;
                tracks.forEach(t => t.enabled = !isMicMuted);
                updateUI();
            }

            // --- Toggle Camera ---
            function toggleCam() {
                if (!localStream) return;
                const tracks = localStream.getVideoTracks();
                if (tracks.length === 0) return;
                isCamOff = !isCamOff;
                tracks.forEach(t => t.enabled = !isCamOff);
                updateUI();
            }

            // --- Fullscreen ---
            function toggleFullscreen() {
                const el = document.documentElement;
                if (!document.fullscreenElement) {
                    el.requestFullscreen?.() || el.webkitRequestFullscreen?.();
                } else {
                    document.exitFullscreen?.() || document.webkitExitFullscreen?.();
                }
            }

            // --- ZOOM FUNCTION ---
            function setZoom(level) {
                zoomLevel = level;
                remoteVideoBox.className = ZOOM_CLASSES[level];
                // Update icon
                const icons = ['🔍', '🔍−', '🔍+'];
                showZoomToast(icons[level]);
            }

            function cycleZoom() {
                if (!remoteStream) return;
                zoomLevel = (zoomLevel + 1) % 3;
                setZoom(zoomLevel);
            }

            // --- DRAG LOCAL VIDEO (Touch & Mouse) ---
            let isDragging = false;
            let dragOffsetX = 0;
            let dragOffsetY = 0;

            function startDrag(e) {
                if (e.type === 'touchstart') {
                    const touch = e.touches[0];
                    const rect = localVideoBox.getBoundingClientRect();
                    dragOffsetX = touch.clientX - rect.left;
                    dragOffsetY = touch.clientY - rect.top;
                } else {
                    const rect = localVideoBox.getBoundingClientRect();
                    dragOffsetX = e.clientX - rect.left;
                    dragOffsetY = e.clientY - rect.top;
                }
                isDragging = true;
                localVideoBox.classList.add('dragging');
                localVideoBox.style.transition = 'none';
                e.preventDefault();
            }

            function moveDrag(e) {
                if (!isDragging) return;
                let clientX, clientY;
                if (e.type === 'touchmove') {
                    const touch = e.touches[0];
                    clientX = touch.clientX;
                    clientY = touch.clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }

                let x = clientX - dragOffsetX;
                let y = clientY - dragOffsetY;

                // Clamp to screen
                const rect = localVideoBox.getBoundingClientRect();
                const w = rect.width;
                const h = rect.height;
                x = Math.max(0, Math.min(window.innerWidth - w, x));
                y = Math.max(0, Math.min(window.innerHeight - h, y));

                localVideoBox.style.left = x + 'px';
                localVideoBox.style.right = 'auto';
                localVideoBox.style.bottom = 'auto';
                localVideoBox.style.top = y + 'px';
                localVideoBox.style.position = 'fixed';
                e.preventDefault();
            }

            function endDrag() {
                if (isDragging) {
                    isDragging = false;
                    localVideoBox.classList.remove('dragging');
                    localVideoBox.style.transition = 'all 0.3s ease';
                }
            }

            // --- Event Listeners ---

            // Zoom on tap remote video
            remoteVideoBox.addEventListener('click', cycleZoom);
            remoteVideoBox.addEventListener('touchstart', (e) => {
                // Only trigger zoom if not dragging
                if (!isDragging) {
                    // Small delay to prevent conflict with drag
                    setTimeout(() => {
                        if (!isDragging) cycleZoom();
                    }, 100);
                }
            });

            // Drag local video
            localVideoBox.addEventListener('mousedown', startDrag);
            document.addEventListener('mousemove', moveDrag);
            document.addEventListener('mouseup', endDrag);

            localVideoBox.addEventListener('touchstart', startDrag, { passive: false });
            document.addEventListener('touchmove', moveDrag, { passive: false });
            document.addEventListener('touchend', endDrag);

            // Control buttons
            endCallBtn.addEventListener('click', endCall);
            toggleMicBtn.addEventListener('click', toggleMic);
            toggleCamBtn.addEventListener('click', toggleCam);
            reconnectBtn.addEventListener('click', reconnect);
            fullscreenBtn.addEventListener('click', toggleFullscreen);

            // --- Init ---
            setStatus('Inisialisasi...', 'purple');
            startLocalStream().then(() => {
                initPeer();
            });

            // Handle page unload
            window.addEventListener('beforeunload', () => {
                if (localStream) localStream.getTracks().forEach(t => t.stop());
                if (peer) peer.destroy();
                if (findInterval) clearInterval(findInterval);
            });

            console.log('📞 Telepon Video Fullscreen');
            console.log('🔑 Room ID:', ROOM_ID);
            console.log('💡 Tap video remote untuk zoom');
            console.log('↕️ Geser video lokal untuk memindahkan');
        })();
    </script>
</body>
</html>
